version: "2"
run:
  timeout: 5m
  tests: true

linters:
  enable:
    - govet
    - revive
    - staticcheck
    - errcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - shadow
  settings:
    revive:
      rules:
        - name: package-comments
          disabled: true
        - name: exported
          disabled: true
    staticcheck:
      checks: ["all"]
    errcheck:
      check-type-assertions: true
      check-blank: true

issues:
  fix: false
  max-issues-per-linter: 0
  max-same-issues: 0
