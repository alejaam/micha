schema: spec-driven

context: |
  Tech stack: Go 1.24 backend + React 18/Vite frontend + PostgreSQL 16.
  Architecture: DDD + Clean Architecture + Hexagonal (backend).
  Testing: Go test + Vitest (@testing-library/react for integration-style UI tests).
  Style: ESLint frontend; golangci-lint/go vet/gofmt for backend.

strict_tdd: true

testing:
  detected: "2026-04-23"
  strict_tdd_mode: enabled
  test_runner:
    framework: "go test + vitest"
    command: "cd backend && go test ./... && cd frontend && npm test -- --run"
  layers:
    unit:
      available: true
      tool: "go test, vitest"
    integration:
      available: true
      tool: "@testing-library/react, net/http/httptest"
    e2e:
      available: false
      tool: "—"
  coverage:
    available: true
    command: "cd backend && go test -cover ./... && cd frontend && npm run test:coverage -- --run"
  quality_tools:
    linter:
      available: true
      command: "cd frontend && npm run lint; cd backend && golangci-lint run ./..."
    type_checker:
      available: true
      command: "cd backend && go vet ./..."
    formatter:
      available: true
      command: "gofmt"

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)
